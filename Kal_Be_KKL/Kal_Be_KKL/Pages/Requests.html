<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../Scripts/ajaxCallsWithKey.js"></script>
    <link href="../Scripts/main.css" rel="stylesheet" />
    <script src="../Scripts/main.js"></script>
    <style>
        body {
            direction: rtl
        }

        #calendar .fc-cantBtn-button {
            background-color: red;
        }

        #calendar .fc-canBtn-button {
            background-color: blue;
        }

        #calendar .fc-wantBtn-button {
            background-color: green;
        }
    </style>
    <script>
        color = null;
        allRequests = [];
        function changeColor() {
            color = $(this).attr('name')
        }
        document.addEventListener('DOMContentLoaded', function () {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'wantBtn canBtn cantBtn',
                    center: 'title',
                    right: 'prev,next'
                },
                visibleRange: function (currentDate) {
                    // Generate a new date for manipulating in the next step
                    var startDate = new Date(currentDate.valueOf());
                    var endDate = new Date(currentDate.valueOf());

                    // Adjust the start & end dates, respectively
                    startDate.setDate(startDate.getDate() - 1); // One day in the past
                    endDate.setDate(endDate.getDate() + 2); // Two days into the future

                    return { start: startDate, end: endDate };
                },
                customButtons: {
                    wantBtn: {
                        text: 'רוצה',
                        click: function () {
                            color = "green";
                        }
                    },
                    canBtn: {
                        text: 'יכול',
                        click: function () {
                            color = "blue";
                        }
                    },
                    cantBtn: {
                        text: 'לא יכול',
                        click: function () {
                            color = "red";
                        }
                    }
                },
                selectable: false,
                showNonCurrentDates: false,
                dateClick: function (el) {
                    if (color != null)
                        el.dayEl.style.backgroundColor = color;
                }
            });
            calendar.next();
            calendar.setOption('locale', 'he');
            calendar.render();
        });
        function saveRequests() {
            if (isAllMarked()) {
                id = JSON.parse(localStorage["Employee"]).Id;
                let status = "";
                $("td").each(function () {
                    let date = $(this).data("date");
                    if (date != null) {
                        let bg = $(this).css('background-color');
                        switch (bg) {
                            case "rgb(255, 0, 0)": status = "cant"; break; //red
                            case "rgb(0, 0, 255)": status = "can"; break; //blue
                            case "rgb(0, 128, 0)": status = "want";
                        }
                        allRequests.push({
                            Id: id,
                            Request_Date: date,
                            Request_Status: status
                        });
                    }
                });
                ajaxCall("POST", "../api/Requests", JSON.stringify(allRequests), postSuccess, postError)
            }
            else
                alert("לא מילאת את כל התאריכים")

        }
        function postSuccess() {
            allRequests = []
            alert("הנתונים הוכנסו בהצלחה")
        }
        function postError(err) {
            console.log(err)
            allRequests = []
            alert("השמירה נכשלה")
        }
        function isAllMarked() {
            let ans = true;
            $("td").each(function () {
                let date = $(this).data("date");
                if (date != null) {
                    let bg = $(this).css('background-color');
                    if (bg == "rgba(0, 0, 0, 0)") {
                        ans = false;
                        return false; // stop the each loop
                    }
                }
            })
            return ans;
        }
    </script>
</head>
<body>
    <div id='calendar'></div>
    <button onclick="saveRequests()">Save</button>
</body>
</html>
