<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="../Scripts/ajaxCallsWithKey.js"></script>
    <script src="../Scripts/jquery-3.4.1.js"></script>
    <link href="../Scripts/main.css" rel="stylesheet" />
    <script src="../Scripts/main.js"></script>
    <style>
        * {
            direction: rtl;
        }

        .blocks {
            width: 33%;
            float: right;
        }
    </style>
    <script>
        var area;
        var blocks;
        var allAssigns;

        $(document).ready(function () {
            let id = JSON.parse(localStorage["Employee"]).Id;
            let getApi = "../api/Area/GetAreaByEmpId/" + id;
            ajaxCall("GET", getApi, "", getAreaSuccess, getAreaError);
        });

        function getAreaSuccess(areaData) {
            area = areaData;
            let getApi = "../api/Area/GetAreaBlcoks/" + area.Area_Id;
            ajaxCall("GET", getApi, "", getAreaBlcoksSuccess, getAreaBlcoksError);
        }

        function getAreaBlcoksSuccess(blocksData) {
            console.log(blocksData)
            blocks = blocksData;
            getAssigns();
            $("#assignBTN").prop('disabled', false);
        }

        function getAreaBlcoksError(err) {
            console.log(err)
        }
        function getAreaError(err) {
            console.log(err)
        }

        function assignToShifts() {
            $('#loading').removeAttr('hidden')
            let postApi = "../api/Day_In_Shift/SmartPost/" + area.Area_Id;
            ajaxCall("POST", postApi, "", postSmartPostSuccess, postSmartPostError);
        }

        function postSmartPostSuccess() {
            console.log("שיבוץ בוצע");
            getAssigns();
            $('#loading').attr("hidden", true)
        }

        function postSmartPostError(err) {
            console.log(err)
        }

        function getAssigns() {
            let getApi = "../api/Day_In_Shift/GetDutiesInShift/" + area.Area_Id;
            ajaxCall("GET", getApi, "", getAssignsSuccess, getAssignsError);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: '',
                    center: 'title',
                    right: ''
                },
                selectable: false,
                showNonCurrentDates: false,
                dateClick: function (el) {
                    $('.fc-daygrid-day').css("backgroundColor","");
                    el.dayEl.style.backgroundColor = "#000"
                    $('#ph').html("");
                    if (allAssigns == undefined || allAssigns[el.dateStr].length == 0)
                        $('#ph').append("<h1>לא בוצע שיבוץ<h1>");
                    else {
                        blocks.forEach(b => {
                            str = "";
                            str = "<div class='blocks'><h1>" + b.Block_Name + "</h1>";
                            allAssigns[el.dateStr].forEach(a => {
                                if (b.Block_Name == a.Block_Name)
                                    str += "<p>" + a.Requirement_Name + ": " + a.First_Name + " " + a.Last_Name;
                            });
                            $('#ph').append(str);
                        });
                    }
                },
                height: 700
            });
            calendar.next();
            calendar.setOption('locale', 'he');
            calendar.render();
        });


        function getAssignsSuccess(data) {
            allAssigns = data
            console.log(data)
        }

        function getAssignsError(err) {
            console.log(err)
        }
    </script>
</head>
<body>
    <div id="container">
        <button id="assignBTN" onclick="assignToShifts()" disabled>בצע שיבוץ</button>
        <div hidden id="loading">
            <img height="100" width="100" src="cupertino_activity_indicator.gif" />
        </div>
        <div id='calendar'></div>
        <div id="ph"></div>
    </div>
</body>
</html>
