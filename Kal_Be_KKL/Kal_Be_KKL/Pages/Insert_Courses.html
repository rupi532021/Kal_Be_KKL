<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="../Scripts/ajaxCallsWithKey.js"></script>
    <script src="../Scripts/jquery-3.4.1.js"></script>
    <style type="text/css">
        .form-control {
            width: 310px
        }

        * {
            direction: rtl
        }

        #ph {
            float: left;
        }     
        #ph1 {
            margin-right:300px;
            padding:5px
        }
        #addcoursebtn
        {
            padding:5px;
            margin:5px;
            margin-right:120px;
        }
        .choose_cousre {
            border: 3px double black;
            background-color: lightgreen;
            text-align: center;
            width:300px;
            float:right
        }
        p {
            font-size: 20px;
            margin-top: 5px;
        }
    </style>
    <script>
        courses_arr = [];
        chosen_courses=[]
        function Add_Course_To_DB()
        {
            for (var i = 0; i < chosen_courses.length; i++) {
                api = "../api/Employees/insert_course_of_duty/" + chosen_courses[i].Receipt_Course_Date + "/" + chosen_courses[i].Course_Id + "/" + chosen_courses[i].Id + "/"
                ajaxCall("POST", api , "", postSuccess, postError)
            }  
        }
        function postSuccess(data)
        {
            console.log(data)
            swal("Added Successfuly!", "Great Job", "success");
            setTimeout("",5000)
            window.location.replace("Requests.html")

        }
        function postError(err)
        {
            console.log(err)
            console.log("error")

        }
        function loadcourses()
        {
            let api = "../api/Course";
            ajaxCall("GET", api, "", getCoursesSuccess, getError)
        }
        function getCoursesSuccess(data)
        {
            courses_arr = data;
            console.log(data)
            str = "";
            data.forEach(c => {
                str += '<option value="' + c.Course_Id + '">' + c.Course_Name + '</option>';
            })
            $("#Course").append(str)
        }
        function getError(err)
        {
            console.log(err)
        }

        $(document).ready(function () {
            loadcourses()
            str="הקורסים של "+localStorage.Full_Name+" הם:"
            $("h2").html(str)
        });
        function deletecourse(course_id)
        {
            console.log("arr before")
            console.log(chosen_courses)
            $("#" + course_id).remove()
            let i = chosen_courses.findIndex(c => c.Course_Id == course_id)
            chosen_courses.splice(i, 1);
            console.log("arr after")
            console.log(chosen_courses)

        }
        function addcourse()
        {
            
            date_of_start_course = $("#DateTB").val()
            course_id = $("#Course").val()
            if (course_id != "0" && $("#DateTB").val() != "")
            {
                courses_arr.forEach(c => {
                    if (c.Course_Id == parseInt(course_id))
                    {
                        if (chosen_courses.some(c=>c.Course_Id==course_id) == false)
                        {
                            str = "<div class='choose_cousre' id='" + c.Course_Id + "'> <p>שם הקורס:  " + c.Course_Name + "</p><p> תאריך ביצוע הקורס: " + date_of_start_course + "</p><input type='button' value='מחק'  onclick='deletecourse(" + c.Course_Id +")'/></div>";
                            mycourses = {
                                "Name": c.Course_Name,
                                "Course_Id": c.Course_Id,
                                "Receipt_Course_Date": date_of_start_course,
                                "Id": localStorage.Id
                            }
                            chosen_courses.push(mycourses)
                            $("#courses").append(str)
                            
                        }
                        else
                         alert("הקורס כבר נבחר, אם תרצה לשנות תאריך יש למחוק ולהוסיף")
                    }
                    
                }) 
            }
            else
                alert("אחד מהפרטים שהוכנסו שגויים")
        }
    </script>
</head>
<body>
    <div class="container">
        <form id="pForm" method="post" enctype="multipart/form-data">
            <div id="ph"> <img src="https://pbs.twimg.com/profile_images/1290558521457737728/OS4hqwDH_400x400.jpg" alt="קק'ל"> </div>
            <h2 id="head"></h2>
            <div class="form-group" id="Courses1">
                <label for="CoursesRB">בחר קורס</label>
                <select class="form-control" id="Course" data-component="dropdown">
                    <option value="0">בחר קורס</option>
                </select>
                <label for="DateLB">תאריך ביצוע הקורס</label>
                <input type="date" class="form-control" id="DateTB">

                <input type="button" id="addcoursebtn" value="הוסף קורס" onclick="addcourse()" />
            </div>



        </form>
        <div id="courses"><h2>הקורסים של העובד:</h2></div>

    </div>
    <div id="ph1"> <input type="submit" value="שמור קורסים" onclick="Add_Course_To_DB()" /></div>
</body>
</html>
