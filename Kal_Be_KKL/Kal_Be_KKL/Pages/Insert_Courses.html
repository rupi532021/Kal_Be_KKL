    <script>
        courses_arr = [];
        chosen_courses=[]
        function Add_Course_To_DB()
        {
            for (var i = 0; i < chosen_courses.length; i++) {
                api = "../api/Employees/insert_course_of_duty/" + chosen_courses[i].Receipt_Course_Date + "/" + chosen_courses[i].Course_Id + "/" + chosen_courses[i].Id + "/"
                ajaxCall("POST", api , "", postSuccess, postError)
            }
        }
        function postSuccess(data)
        {
            console.log(data)
            swal("Added Successfuly!", "Great Job", "success");
            setTimeout("",5000)
            window.location.replace("Requests.html")

        }
        function postError(err)
        {
            console.log(err)
            console.log("error")

        }
        function loadcourses()
        {
            let api = "../api/Course";
            ajaxCall("GET", api, "", getCoursesSuccess, getError)
        }
        function getCoursesSuccess(data)
        {
            courses_arr = data;
            console.log(data)
            str = "";
            data.forEach(c => {
                str += '<option value="' + c.Course_Id + '">' + c.Course_Name + '</option>';
            })
            $("#Course").append(str)
        }
        function getError(err)
        {
            console.log(err)
        }

        $(document).ready(function () {
            loadcourses()
            fullName = JSON.parse(localStorage["Employee"]).First_Name + " " + JSON.parse(localStorage["Employee"]).Last_Name;;
            str = "הקורסים של " + fullName+" הם:"
            $("h2").html(str)
          var wWidth = $(window).width();

}
else{

                let employee = JSON.parse(localStorage["Employee"]);

          $("#phHello").append(str1);
        });


        function deletecourse(course_id)
        {
            console.log("arr before")
            console.log(chosen_courses)
            $("#" + course_id).remove()
            let i = chosen_courses.findIndex(c => c.Course_Id == course_id)
            chosen_courses.splice(i, 1);
            console.log("arr after")
            console.log(chosen_courses)

        }
        function addcourse()
        {

            date_of_start_course = $("#DateTB").val()
            course_id = $("#Course").val()
            if (course_id != "0" && $("#DateTB").val() != "")
            {
                courses_arr.forEach(c => {
                    if (c.Course_Id == parseInt(course_id))
                    {
                        if (chosen_courses.some(c=>c.Course_Id==course_id) == false)
                        {
                            str = "<div class='choose_cousre' id='" + c.Course_Id + "'> <p>שם הקורס:  " + c.Course_Name + "</p><p> תאריך ביצוע הקורס: " + date_of_start_course + "</p><input type='button' value='מחק'  onclick='deletecourse(" + c.Course_Id +")'/></div>";
                            mycourses = {
                                "Name": c.Course_Name,
                                "Course_Id": c.Course_Id,
                                "Receipt_Course_Date": date_of_start_course,
                                "Id": JSON.parse(localStorage["Employee"]).Id
                            }
                            chosen_courses.push(mycourses)
                            $("#courses").append(str)

                        }
                        else
                         alert("הקורס כבר נבחר, אם תרצה לשנות תאריך יש למחוק ולהוסיף")
                    }

                })
            }
            else
                alert("אחד מהפרטים שהוכנסו שגויים")
        }
